<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MediSpot | 求職者マイページ</title>
  <link rel="stylesheet" href="medispot-app.css">
</head>
<body>
  <header class="app-header">
    <div class="shell header-inner">
      <a class="brand" href="index.html"><span class="brand-mark">＋</span><span>MediSpot</span></a>
      <span class="user-pill">求職者：佐藤 花子</span>
      <nav class="app-nav" aria-label="求職者メニュー">
        <a class="active" href="seeker-home.html">マイページ</a>
        <a href="seeker-profile.html">プロフィール</a>
        <a href="seeker-resume.html">履歴書・職務経歴</a>
        <a href="seeker-jobs.html">求人検索</a>
        <a href="login.html">ログアウト</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <div class="shell">
      <div class="page-head">
        <h1>ようこそ、佐藤 花子 さん</h1>
        <p>求職者マイページ（ホーム）</p>
      </div>

      <section class="grid-3" aria-label="利用状況">
        <article class="card stat-card"><strong>1</strong><span>応募中の求人</span></article>
        <article class="card stat-card orange"><strong>0</strong><span>マッチング成立</span></article>
        <article class="card stat-card green"><strong>7</strong><span>掲載中の求人</span></article>
      </section>

      <section class="grid-2" style="margin-top: 34px;" aria-label="メニュー">
        <a class="card quick-card" href="seeker-profile.html">
          <span class="quick-icon">📋</span>
          <span><h2>スキル・プロフィール登録</h2><p>資格・経験・希望条件・資格証を登録</p></span>
        </a>
        <a class="card quick-card" href="seeker-resume.html">
          <span class="quick-icon">📄</span>
          <span><h2>履歴書・職務経歴書</h2><p>学歴・職歴・免許資格・自己PRを登録</p></span>
        </a>
        <a class="card quick-card" href="seeker-jobs.html">
          <span class="quick-icon">🔍</span>
          <span><h2>求人検索・一覧</h2><p>職種・雇用形態・キーワードで求人を探す</p></span>
        </a>
      </section>
    </div>
  </main>
</body>
</html>
