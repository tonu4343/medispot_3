<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MediSpot | 成功報酬管理</title>
  <link rel="stylesheet" href="medispot-app.css">
</head>
<body>
  <header class="app-header">
    <div class="shell header-inner">
      <a class="brand" href="index.html"><span class="brand-mark">＋</span><span>MediSpot</span></a>
      <span class="user-pill admin-pill">管理者：運営担当</span>
      <nav class="app-nav" aria-label="管理者メニュー">
        <a href="admin-home.html">管理画面</a>
        <a href="seeker-home.html">求職者画面</a>
        <a href="employer-home.html">求人者画面</a>
        <a href="login.html">ログアウト</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <div class="shell admin-layout">
      <aside class="card admin-sidebar">
        <h2>管理メニュー</h2>
        <a href="admin-home.html">ダッシュボード</a>
        <a href="admin-seekers.html">求職者管理</a>
        <a href="admin-employers.html">医療機関管理</a>
        <a href="admin-jobs.html">求人管理</a>
        <a href="admin-applications.html">応募・選考管理</a>
        <a class="active" href="admin-payments.html">成功報酬管理</a>
      </aside>

      <section class="admin-main">
        <div class="listing-head">
          <div>
            <span class="eyebrow-lite">Payments</span>
            <h1>成功報酬管理</h1>
            <p>採用成立後の請求金額、請求状態、入金状態を管理します。</p>
          </div>
        </div>
        <section class="metric-strip admin-metrics">
          <article><strong>2</strong><span>請求対象</span></article>
          <article><strong>¥110,000</strong><span>請求予定</span></article>
          <article><strong>1</strong><span>未請求</span></article>
        </section>
        <section class="card admin-table-card">
          <div class="admin-table-wrap">
            <table class="admin-table">
              <thead><tr><th>成立案件</th><th>医療機関</th><th>求職者</th><th>金額</th><th>状態</th><th>操作</th></tr></thead>
              <tbody>
                <tr><td>理学療法士 常勤</td><td>ブランチ総合クリニック</td><td>山田 太郎</td><td>3,300円（税込）</td><td><span class="status-pill warning">未請求</span></td><td><button class="table-btn">請求作成</button></td></tr>
                <tr><td>放射線技師 土日休み</td><td>中央健診センター</td><td>鈴木 一郎</td><td>3,300円（税込）</td><td><span class="status-pill green">入金済み</span></td><td><button class="table-btn">確認</button></td></tr>
              </tbody>
            </table>
          </div>
        </section>
      </section>
    </div>
  </main>
</body>
</html>
