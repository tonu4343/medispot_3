<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MediSpot | 求人作成</title>
  <link rel="stylesheet" href="medispot-app.css">
</head>
<body>
  <header class="app-header">
    <div class="shell header-inner">
      <a class="brand" href="index.html"><span class="brand-mark">🏥</span><span>メディスポット</span></a>
      <span class="user-pill">求人者：ブランチ総合クリニック</span>
      <nav class="app-nav" aria-label="求人者メニュー">
        <a href="employer-home.html">マイページ</a>
        <a class="active" href="employer-job-post.html">求人作成</a>
        <a href="employer-applicants.html">応募者確認</a>
        <a href="login.html">ログアウト</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <div class="shell content-grid">
      <section>
        <div class="page-head">
          <h1>求人作成</h1>
          <p>医療人材に伝わりやすい求人情報を入力します。</p>
        </div>
        <form class="card panel">
          <div class="form-grid">
            <div class="field full"><label for="job-title">求人タイトル</label><input id="job-title" value="【日勤のみ】外来看護師（ブランクOK・週3日〜）"></div>
            <div class="field"><label for="profession">募集職種</label><select id="profession"><option>看護師</option><option>放射線技師</option><option>理学療法士</option></select></div>
            <div class="field"><label for="job-style">雇用形態</label><select id="job-style"><option>非常勤</option><option>スポット</option><option>常勤</option></select></div>
            <div class="field"><label for="salary">給与</label><input id="salary" value="時給 2,200円〜2,600円"></div>
            <div class="field"><label for="area">勤務地</label><input id="area" value="東京都世田谷区"></div>
            <div class="field full"><label for="description">仕事内容</label><textarea id="description">外来での採血・点滴・診療補助・患者対応をお願いします。電子カルテ経験者歓迎。</textarea></div>
            <div class="field full"><label for="requirements">応募条件</label><textarea id="requirements">看護師資格、外来経験1年以上。ブランクがある方も相談可能です。</textarea></div>
          </div>
          <div class="actions"><button class="btn primary" type="button">求人を保存する</button><button class="btn secondary" type="button">下書き保存</button></div>
        </form>
      </section>
      <aside class="card panel">
        <h2>掲載メモ</h2>
        <ul class="side-list">
          <li><span>1</span>勤務曜日と時間を明確にする</li>
          <li><span>2</span>給与レンジを具体的に書く</li>
          <li><span>3</span>歓迎スキルを分けて記載する</li>
        </ul>
      </aside>
    </div>
  </main>
</body>
</html>
