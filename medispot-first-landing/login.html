<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ログイン | MediSpot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header simple-header">
    <a class="brand" href="index.html"><span class="brand-mark">＋</span>MediSpot</a>
  </header>

  <main class="auth-page">
    <section class="auth-card">
      <h1>ログイン</h1>
      <p>メールアドレスとパスワードを入力してください。</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">メールアドレス</label>
          <input type="email" id="email" autocomplete="email" required>
        </div>

        <div class="form-group">
          <label for="password">パスワード</label>
          <input type="password" id="password" autocomplete="current-password" required>
        </div>

        <button type="submit" class="button button-teal auth-submit">ログイン</button>

        <div class="demo-login">
          <button type="button" id="seekerDemo">求職者デモ</button>
          <button type="button" id="employerDemo">求人者デモ</button>
        </div>

        <p class="auth-link">
          アカウントをお持ちでない方は
          <a href="register.html">会員登録</a>
        </p>
      </form>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="login.js"></script>
</body>
</html>
