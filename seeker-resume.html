<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MediSpot | 履歴書・職務経歴書</title>
  <link rel="stylesheet" href="medispot-app.css">
</head>
<body>
  <header class="app-header">
    <div class="shell header-inner">
      <a class="brand" href="index.html"><span class="brand-mark">＋</span><span>MediSpot</span></a>
      <span class="user-pill">求職者：佐藤 花子</span>
      <nav class="app-nav" aria-label="求職者メニュー">
        <a href="seeker-home.html">マイページ</a>
        <a href="seeker-profile.html">プロフィール</a>
        <a class="active" href="seeker-resume.html">履歴書・職務経歴</a>
        <a href="seeker-jobs.html">求人検索</a>
        <a href="login.html">ログアウト</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <div class="shell">
      <div class="page-head">
        <h1>履歴書・職務経歴書</h1>
        <p>応募時に医療機関へ提示する内容を登録できます。</p>
      </div>

      <section class="card panel">
        <h2>📄 履歴書</h2>
        <p class="section-note">氏名・生年月日・年齢はプロフィール登録内容を使用します。</p>
        <h3>学歴</h3>
        <div class="repeat-row"><input value="2010-03"><input value="東京都立〇〇高等学校 普通科 卒業"><button class="btn danger" type="button">削除</button></div>
        <div class="repeat-row"><input value="2013-03"><input value="〇〇看護専門学校 看護学科 卒業"><button class="btn danger" type="button">削除</button></div>
        <button class="btn secondary" type="button">＋ 学歴を追加</button>

        <h3>免許・資格</h3>
        <div class="repeat-row"><input value="2013-04"><input value="正看護師免許 取得"><button class="btn danger" type="button">削除</button></div>
        <div class="repeat-row"><input value="2018-06"><input value="BLSプロバイダー 取得"><button class="btn danger" type="button">削除</button></div>
        <button class="btn secondary" type="button">＋ 免許・資格を追加</button>

        <div class="field full" style="margin-top: 26px;">
          <label for="hope">本人希望記入欄</label>
          <textarea id="hope">週3日程度の日勤帯での勤務を希望します。</textarea>
        </div>
      </section>

      <section class="card panel">
        <h2>📑 職務経歴書</h2>
        <div class="field full">
          <label for="summary">職務要約</label>
          <textarea id="summary">総合病院の外来にて約8年間勤務。採血・点滴、外来対応、電子カルテ運用、後輩指導に従事してきました。</textarea>
        </div>
        <h3>職務経歴</h3>
        <div class="repeat-row"><input value="2013/04〜現在"><input value="△△総合病院"><input value="外来／内科病棟"><button class="btn danger" type="button">削除</button></div>
        <button class="btn secondary" type="button">＋ 職務経歴を追加</button>
        <div class="field full" style="margin-top: 26px;">
          <label for="skills">活かせる経験・知識・スキル</label>
          <textarea id="skills">外来トリアージ／電子カルテ（HOPE）運用／新人・実習生指導</textarea>
        </div>
        <div class="field full">
          <label for="resume-pr">自己PR</label>
          <textarea id="resume-pr">患者様一人ひとりに寄り添う対応を心がけてきました。チーム医療での連携を得意としています。</textarea>
        </div>
      </section>

      <div class="actions">
        <button class="btn primary" type="button">履歴書・職務経歴書を保存する</button>
        <button class="btn secondary" type="button">📄 ダウンロード</button>
      </div>
    </div>
  </main>
</body>
</html>
